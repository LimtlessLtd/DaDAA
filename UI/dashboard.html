<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DaDAA Dashboard</title>
  <style>
    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
      background: #0f172a; 
      color: #f8fafc; 
      padding: 16px; 
      margin: 0; 
    }
    .container { 
      max-width: 1200px; 
      margin: 0 auto; 
    }
    header { 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      margin-bottom: 16px; 
      border-bottom: 1px solid #1e293b; 
      padding-bottom: 12px; 
    }
    h1 { 
      font-size: 1.25rem; 
      font-weight: 600; 
      margin: 0; 
      color: #f1f5f9; 
    }
    .status-badge { 
      background: #1e293b; 
      border: 1px solid #334155; 
      padding: 4px 8px; 
      border-radius: 6px; 
      font-size: 0.75rem; 
      color: #94a3b8; 
    }
    .grid { 
      display: grid; 
      grid-template-columns: 1fr 1.5fr; 
      gap: 16px; 
    }
    @media(max-width: 768px) { 
      .grid { grid-template-columns: 1fr; } 
    }
    .panel { 
      background: #1e293b; 
      border: 1px solid #334155; 
      border-radius: 8px; 
      padding: 12px; 
      display: flex; 
      flex-direction: column; 
    }
    .panel-title { 
      font-size: 0.9rem; 
      font-weight: 600; 
      text-transform: uppercase; 
      letter-spacing: 0.05em; 
      color: #94a3b8; 
      margin-bottom: 12px; 
      border-bottom: 1px solid #334155; 
      padding-bottom: 6px; 
      display: flex; 
      justify-content: space-between; 
      align-items: center;
    }
    .item { 
      background: #0f172a; 
      padding: 8px 12px; 
      border-radius: 6px; 
      margin-bottom: 8px; 
      border: 1px solid #1e293b; 
      font-size: 0.85rem; 
    }
    button { 
      cursor: pointer; 
      background: #3b82f6; 
      color: white; 
      border: none; 
      padding: 6px 12px; 
      border-radius: 6px; 
      font-size: 0.8rem; 
      font-weight: 500; 
      transition: background 0.2s; 
    }
    button:hover { 
      background: #2563eb; 
    }
    #triggerBanner { 
      display: none; 
      margin-bottom: 8px; 
      padding: 8px; 
      border-radius: 6px; 
      color: #fff; 
      background: #b91c1c; 
      font-weight: 700; 
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>DaDAA Dashboard</h1>
      <div id="status" class="status-badge">Status: Ready</div>
    </header>

    <div class="grid">
      <!-- Left Column: Insights / Memory -->
      <div class="panel">
        <div class="panel-title">Recent AI Insights</div>
        <div id="memory"></div>
      </div>

      <!-- Right Column: Transcripts -->
      <div class="panel">
        <div class="panel-title">
          Transcript History
          <button id="transcriptToggleBtn">Show full transcript</button>
        </div>
        <div id="triggerBanner"></div>
        <div id="transcriptLog"></div>
      </div>
    </div>
  </div>

  <script>
    const speakerColors = ['#3b82f6', '#10b981', '#f59e0b', '#f97316', '#8b5cf6', '#ec4899', '#14b8a6'];
    const speakerColorMap = {};
    let transcriptFullView = false;
    const transcriptPreviewLines = 20;

    function getSpeakerColor(source) {
      if (!speakerColorMap[source]) {
        const idx = Object.keys(speakerColorMap).length % speakerColors.length;
        speakerColorMap[source] = speakerColors[idx];
      }
      return speakerColorMap[source];
    }

    function getInitials(name) {
      try {
        const parts = String(name || '').split(/\s+/).filter(Boolean);
        if (parts.length === 0) return '?';
        if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
        return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
      } catch (e) { 
        return '?'; 
      }
    }

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    async function loadData() {
      // 1. Load AI Memory
      try {
        const memory = await fetch('/temp_data/ai_memory.json').then((r) => r.json());
        const memoryContainer = document.getElementById('memory');
        
        if (memory.summaries && memory.summaries.length) {
          memoryContainer.innerHTML = memory.summaries.slice(-15).reverse().map((entry) => {
            if (entry.type === 'ai_insight') {
              return `
                <div class="item" style="border-left: 4px solid #f59e0b;">
                  <div style="font-size: 11px; color: #64748b;">${escapeHtml(entry.timestamp)}</div>
                  <div style="margin-top: 4px; color: #fef3c7; font-weight: 600;">${escapeHtml(entry.suggestion)}</div>
                  <div style="margin-top: 4px; font-size: 12px; color: #94a3b8; font-style: italic;">"${escapeHtml(entry.transcript)}"</div>
                </div>`;
            }
            const headline = entry.summary ? entry.summary.headline : 'AI Observation';
            const advice = entry.summary ? entry.summary.advice : '';
            return `
              <div class="item">
                <div style="font-size: 11px; color: #64748b;">${escapeHtml(entry.timestamp)}</div>
                <strong style="color: #cbd5e1;">${escapeHtml(headline)}</strong>
                <div style="margin-top: 4px; color: #94a3b8;">${escapeHtml(advice)}</div>
              </div>`;
          }).join('');
        } else {
          memoryContainer.innerHTML = '<div class="item">No high-importance insights yet.</div>';
        }
      } catch (e) {
        document.getElementById('memory').innerHTML = '<div class="item">No insights recorded.</div>';
      }

      // 2. Load Transcript Log
      try {
        const transcriptText = await fetch('/api/transcript_log').then((r) => r.text());
        renderTranscriptLog(transcriptText || '');
      } catch (e) {
        document.getElementById('transcriptLog').innerHTML = '<div class="item">No live transcript stream found.</div>';
      }
    }

    function renderTranscriptLog(text) {
      let lines = String(text).split('\n').filter(Boolean);
      const container = document.getElementById('transcriptLog');

      if (lines.length === 0) {
        container.innerHTML = '<div class="item">No transcript yet.</div>';
        updateTranscriptToggle();
        return;
      }

      lines = lines.reverse();
      if (!transcriptFullView) {
        lines = lines.slice(0, transcriptPreviewLines);
      }

      updateTranscriptToggle();

      container.innerHTML = lines.map((line) => {
        const match = line.match(/^\[(.+?)\] \[(.+?)\] (.*)$/);
        if (!match) {
          return `<div class="item">${escapeHtml(line)}</div>`;
        }
        const [, timestamp, source, transcriptText] = match;
        const color = getSpeakerColor(source);
        const fullText = String(transcriptText || '');
        const shortText = fullText.length > 150 ? fullText.slice(0, 150) + '…' : fullText;
        const initials = getInitials(source);

        return `
          <div class="item transcript-item" data-full="${escapeHtml(fullText)}" data-short="${escapeHtml(shortText)}" style="border-left: 3px solid ${color}; display: flex; gap: 10px; align-items: flex-start; cursor: pointer;">
            <div style="width: 32px; flex: none; display: flex; align-items: center; justify-content: center; background: ${color}; border-radius: 50%; height: 32px; font-weight: 700; font-size: 0.75rem; color: #fff;">${escapeHtml(initials)}</div>
            <div style="flex: 1; min-width: 0;">
              <div style="display: flex; justify-content: space-between; align-items: center;">
                <strong style="font-size: 0.85rem; color: #e2e8f0;">${escapeHtml(source)}</strong>
                <span style="color: #64748b; font-size: 0.7rem;">${escapeHtml(timestamp)}</span>
              </div>
              <div class="transcript-text" style="margin-top: 4px; color: #cbd5e1; line-height: 1.4;">${escapeHtml(shortText)}</div>
            </div>
          </div>`;
      }).join('');

      // Click to Expand / Collapse long messages
      container.querySelectorAll('.transcript-item').forEach(item => {
        item.addEventListener('click', () => {
          const full = item.getAttribute('data-full');
          const short = item.getAttribute('data-short');
          const txtDiv = item.querySelector('.transcript-text');
          txtDiv.innerText = txtDiv.innerText === short ? full : short;
        });
      });
    }

    function updateTranscriptToggle() {
      const button = document.getElementById('transcriptToggleBtn');
      if (!button) return;
      button.innerText = transcriptFullView ? `Show latest ${transcriptPreviewLines} lines` : 'Show full transcript';
    }

    function toggleTranscriptView() {
      transcriptFullView = !transcriptFullView;
      loadData();
    }

    document.getElementById('transcriptToggleBtn').addEventListener('click', toggleTranscriptView);

    // Initial setup
    loadData();
    setInterval(loadData, 3000); // Polling every 3 seconds for snap response times
  </script>
</body>
</html>
